<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Иконочный шрифт</title>
	<style>
		html,body{
			height: 100%;
		}
		body{
			padding: 1.875rem;
			font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
			font-size: 1em;
			background-color:#333;
			color:#fff;
		}
		.iconfont-page h1{
			font-size: 1.875rem;
			margin-bottom: 2rem;
		}
		.iconfont-page ul{
			display: flex;
			flex-wrap: wrap;
			gap: 2.5rem;
			margin: 0;
			padding: 0;
		}
		.iconfont-page ul li{
			margin-bottom: 0.625rem;
			display: inline-flex;
			gap: 0.625rem;
			list-style: none;
			align-items: center;
		}
		.iconfont-page ul li::before{
			font-size: 2rem;
		}
		@font-face { 
	font-family: "iconfont"; 
	font-display: swap;
	src: url("iconfont.woff2?c9b11723927b81288dd5e9acc79deb53") format("woff2"); 
} 
[class*="--icon-"]::before{
	font-family: iconfont; 
}
	[class*="--icon-twitter"]::before { 
		content: "\f101"; 
	} 
	[class*="--icon-tick"]::before { 
		content: "\f102"; 
	} 
	[class*="--icon-star"]::before { 
		content: "\f103"; 
	} 
	[class*="--icon-small-arrow"]::before { 
		content: "\f104"; 
	} 
	[class*="--icon-select-arrow"]::before { 
		content: "\f105"; 
	} 
	[class*="--icon-google"]::before { 
		content: "\f106"; 
	} 
	[class*="--icon-github"]::before { 
		content: "\f107"; 
	} 
	[class*="--icon-facebook"]::before { 
		content: "\f108"; 
	} 
	[class*="--icon-arrow"]::before { 
		content: "\f109"; 
	} 

	</style>
</head>
<body>
	<div class="iconfont-page">
<h1>Список иконок и их классов:</h1>
		<ul>
				<li class="--icon-twitter">--icon-twitter</li>
				<li class="--icon-tick">--icon-tick</li>
				<li class="--icon-star">--icon-star</li>
				<li class="--icon-small-arrow">--icon-small-arrow</li>
				<li class="--icon-select-arrow">--icon-select-arrow</li>
				<li class="--icon-google">--icon-google</li>
				<li class="--icon-github">--icon-github</li>
				<li class="--icon-facebook">--icon-facebook</li>
				<li class="--icon-arrow">--icon-arrow</li>
		</ul>
	</div>
</body>
</html>
